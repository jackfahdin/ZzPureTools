# ZzFluent CI 入口（Qt 6.8.0+）
# 自动触发：当前代码处于测试阶段，push / pull_request 自动触发已临时关闭
# 手动编译：本文件 workflow_dispatch（Qt 选项须与 packaging/ci/qt-versions.json 同步）
# 发布部署：推送 v* tag 触发 .github/workflows/release.yml
# 详细构建逻辑见：
#   .github/workflows/build-matrix-job.yml
#   .github/actions/cmake-build/
#   .github/actions/package-artifacts/
#   packaging/ci/generate_build_matrix.py

name: 多平台编译

on:
  # TODO: 测试阶段结束后重新开启 push / pull_request 自动触发
  # push:
  #   branches: [main, master]
  # pull_request:
  #   branches: [main, master]
  workflow_dispatch:
    inputs:
      qt_version:
        description: Qt 版本（须 >= 6.8.0，且与 packaging/ci/qt-versions.json 的 supported 列表保持一致）
        required: true
        default: "6.11.1"
        type: choice
        options:
          - "6.11.1"
          - "6.10.0"
          - "6.9.0"
          - "6.8.0"
      build_type:
        description: CMake 构建类型
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug
      build_example:
        description: 是否编译示例程序
        required: true
        default: true
        type: boolean
      build_shared:
        description: 是否构建动态库
        required: true
        default: true
        type: boolean

      build_windows:
        description: 是否编译 Windows
        required: true
        default: true
        type: boolean
      build_linux:
        description: 是否编译 Linux
        required: true
        default: true
        type: boolean
      build_macos:
        description: 是否编译 macOS
        required: true
        default: true
        type: boolean

      windows_toolchain:
        description: Windows 工具链
        required: true
        default: msvc
        type: choice
        options:
          - none
          - msvc
          - mingw
          - all
      windows_arch:
        description: Windows 架构
        required: true
        default: x64
        type: choice
        options:
          - none
          - x64
          - arm64
          - all
      linux_arch:
        description: Linux 架构
        required: true
        default: x64
        type: choice
        options:
          - none
          - x64
          - arm64
          - all
      macos_arch:
        description: macOS 架构
        required: true
        default: all
        type: choice
        options:
          - none
          - x64
          - arm64
          - all

      package_portable:
        description: 打包可运行测试包
        required: true
        default: true
        type: boolean
      package_sdk:
        description: 打包完整 SDK
        required: true
        default: true
        type: boolean

# push / pull_request 时使用的默认值；workflow_dispatch 时优先使用用户输入
env:
  QT_VERSION: ${{ inputs.qt_version || '6.11.1' }}
  BUILD_TYPE: ${{ inputs.build_type || 'Release' }}
  BUILD_EXAMPLE: ${{ github.event_name == 'workflow_dispatch' && format('{0}', inputs.build_example) || 'true' }}
  BUILD_SHARED: ${{ github.event_name == 'workflow_dispatch' && format('{0}', inputs.build_shared) || 'true' }}
  PACKAGE_PORTABLE: ${{ github.event_name == 'workflow_dispatch' && format('{0}', inputs.package_portable) || 'false' }}
  PACKAGE_SDK: ${{ github.event_name == 'workflow_dispatch' && format('{0}', inputs.package_sdk) || 'false' }}
  BUILD_WINDOWS: ${{ github.event_name == 'workflow_dispatch' && format('{0}', inputs.build_windows) || 'true' }}
  BUILD_LINUX: ${{ github.event_name == 'workflow_dispatch' && format('{0}', inputs.build_linux) || 'true' }}
  BUILD_MACOS: ${{ github.event_name == 'workflow_dispatch' && format('{0}', inputs.build_macos) || 'true' }}
  WINDOWS_TOOLCHAIN: ${{ github.event_name == 'workflow_dispatch' && inputs.windows_toolchain || 'msvc' }}
  WINDOWS_ARCH: ${{ github.event_name == 'workflow_dispatch' && inputs.windows_arch || 'x64' }}
  LINUX_ARCH: ${{ github.event_name == 'workflow_dispatch' && inputs.linux_arch || 'x64' }}
  MACOS_ARCH: ${{ github.event_name == 'workflow_dispatch' && inputs.macos_arch || 'all' }}

jobs:
  plan:
    name: 生成构建矩阵
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      qt_version: ${{ steps.config.outputs.qt_version }}
      build_type: ${{ steps.config.outputs.build_type }}
      build_example: ${{ steps.config.outputs.build_example }}
      build_shared: ${{ steps.config.outputs.build_shared }}
      package_portable: ${{ steps.config.outputs.package_portable }}
      package_sdk: ${{ steps.config.outputs.package_sdk }}
    steps:
      - uses: actions/checkout@v4

      - name: 输出构建参数
        id: config
        shell: bash
        run: |
          echo "qt_version=${{ env.QT_VERSION }}" >> "$GITHUB_OUTPUT"
          echo "build_type=${{ env.BUILD_TYPE }}" >> "$GITHUB_OUTPUT"
          echo "build_example=${{ env.BUILD_EXAMPLE }}" >> "$GITHUB_OUTPUT"
          echo "build_shared=${{ env.BUILD_SHARED }}" >> "$GITHUB_OUTPUT"
          echo "package_portable=${{ env.PACKAGE_PORTABLE }}" >> "$GITHUB_OUTPUT"
          echo "package_sdk=${{ env.PACKAGE_SDK }}" >> "$GITHUB_OUTPUT"

      - name: 计算 matrix
        id: gen
        env:
          QT_VERSION: ${{ env.QT_VERSION }}
          BUILD_WINDOWS: ${{ env.BUILD_WINDOWS }}
          BUILD_LINUX: ${{ env.BUILD_LINUX }}
          BUILD_MACOS: ${{ env.BUILD_MACOS }}
          WINDOWS_TOOLCHAIN: ${{ env.WINDOWS_TOOLCHAIN }}
          WINDOWS_ARCH: ${{ env.WINDOWS_ARCH }}
          LINUX_ARCH: ${{ env.LINUX_ARCH }}
          MACOS_ARCH: ${{ env.MACOS_ARCH }}
        run: python3 packaging/ci/generate_build_matrix.py

      - name: 打印 matrix
        run: echo '${{ steps.gen.outputs.matrix }}'

  build:
    name: ${{ matrix.display_name }}
    needs: plan
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    uses: ./.github/workflows/build-matrix-job.yml
    with:
      os: ${{ matrix.os }}
      display_name: ${{ matrix.display_name }}
      platform: ${{ matrix.platform }}
      platform_id: ${{ matrix.platform_id }}
      toolchain: ${{ matrix.toolchain }}
      qt_host: ${{ matrix.qt_host }}
      qt_arch: ${{ matrix.qt_arch }}
      arch_label: ${{ matrix.arch_label }}
      cpu: ${{ matrix.cpu }}
      needs_msvc_env: ${{ matrix.needs_msvc_env }}
      osx_arch: ${{ matrix.osx_arch || '' }}
      qt_tools: ${{ matrix.qt_tools || '' }}
      qt_version: ${{ needs.plan.outputs.qt_version }}
      build_type: ${{ needs.plan.outputs.build_type }}
      build_example: ${{ needs.plan.outputs.build_example }}
      build_shared: ${{ needs.plan.outputs.build_shared }}
      package_portable: ${{ needs.plan.outputs.package_portable }}
      package_sdk: ${{ needs.plan.outputs.package_sdk }}
