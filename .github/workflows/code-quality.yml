# ZzPureTools 代码质量检查
# 自动触发：当前代码处于测试阶段，push / pull_request 自动触发已临时关闭
# 手动检查：本文件 workflow_dispatch
# 本工作流负责运行 clang-format 与 clang-tidy，不执行完整编译矩阵。

name: 代码质量检查

on:
  # TODO: 测试阶段结束后重新开启 push / pull_request 自动触发
  # push:
  #   branches: [main, master]
  # pull_request:
  #   branches: [main, master]
  workflow_dispatch:
    inputs:
      qt_version:
        description: Qt 版本（须 >= 6.8.0，且与 packaging/ci/qt-versions.json 的 supported 列表保持一致）
        required: true
        default: "6.11.1"
        type: choice
        options:
          - "6.11.1"
          - "6.10.0"
          - "6.9.0"
          - "6.8.0"

env:
  QT_VERSION: ${{ inputs.qt_version || '6.11.1' }}

jobs:
  code-quality:
    name: 格式与静态检查
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          arch: gcc_64
          cache: true
          install-deps: true

      - name: 安装检查工具
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy ninja-build

      - name: CMake 配置（生成 compile_commands.json）
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}" \
            -DZZ_BUILD_SHARED_LIBS=ON \
            -DZZ_BUILD_EXAMPLE=ON \
            -DZZ_INSTALL=ON \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: clang-format 检查
        run: |
          FILES=$(find example include src packaging/sdk/examples -type f \( -name '*.cpp' -o -name '*.hpp' -o -name '*.h' \) | sort)
          echo "检查文件数: $(echo "$FILES" | wc -l)"
          echo "$FILES" | xargs clang-format --dry-run --Werror

      - name: clang-tidy 检查
        run: |
          FILES=$(find example include src packaging/sdk/examples -type f \( -name '*.cpp' -o -name '*.hpp' -o -name '*.h' \) | sort)
          echo "检查文件数: $(echo "$FILES" | wc -l)"
          echo "$FILES" | xargs clang-tidy -p build --quiet
