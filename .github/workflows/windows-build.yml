# =============================================================================
# ZzFluent - Windows 手动编译工作流
# =============================================================================
# 用途：在 GitHub Actions 上使用 MSVC 编译 ZzFluent 库与示例程序
# 触发：仅支持在 GitHub 网页 Actions 页手动运行（workflow_dispatch）
# 修改：如需更换 Qt 版本、构建类型或编译选项，请编辑下方 inputs 与 env 区域
# =============================================================================

name: Windows 编译

on:
  # 仅手动触发，不会在 push / PR 时自动运行
  workflow_dispatch:
    inputs:
      # Qt 版本：需与 CMakeLists.txt 中 find_package(Qt6 6.10 ...) 保持一致或更高
      qt_version:
        description: Qt 版本号（例如 6.10.0）
        required: true
        default: "6.10.0"
        type: string
      # 构建类型：Release 用于发布，Debug 用于调试
      build_type:
        description: CMake 构建类型
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug
      # 是否编译示例程序
      build_example:
        description: 是否编译 ZzFluentExample
        required: true
        default: true
        type: boolean
      # 是否构建动态库（OFF 时为静态库）
      build_shared:
        description: 是否构建动态库 ZzFluent.dll
        required: true
        default: true
        type: boolean

# 全局环境变量：可按需调整编译器工具链
env:
  # Qt 安装架构：MSVC 2022 64 位
  QT_ARCH: win64_msvc2022_64
  # CMake 生成器：Ninja 编译速度较快
  CMAKE_GENERATOR: Ninja

jobs:
  build-windows:
    name: Windows MSVC 编译
    runs-on: windows-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. 检出代码
      # -----------------------------------------------------------------------
      - name: 检出仓库代码
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. 准备 MSVC 编译环境（cl.exe / link.exe）
      # -----------------------------------------------------------------------
      - name: 初始化 MSVC 开发环境
        uses: ilammy/msvc-dev-cmd@v1

      # -----------------------------------------------------------------------
      # 3. 安装 Qt（通过 aqt 在线镜像）
      #    注意：不要写 modules: qtbase！
      #    Qt6 桌面版默认已含 Widgets，qtbase 是主包名而非可选模块名，
      #    写上会导致 aqt 报错：The packages ['qtbase'] were not found
      #    若需额外模块（如 qtcharts），在 modules 里填模块名，例如：qtcharts
      # -----------------------------------------------------------------------
      - name: 安装 Qt ${{ inputs.qt_version }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ inputs.qt_version }}
          arch: ${{ env.QT_ARCH }}
          cache: true

      # -----------------------------------------------------------------------
      # 4. CMake 配置
      # -----------------------------------------------------------------------
      - name: CMake 配置
        shell: pwsh
        run: |
          # QT_ROOT_DIR 由 install-qt-action 自动注入
          Write-Host "Qt 路径: $env:QT_ROOT_DIR"
          cmake -B build `
            -G "${{ env.CMAKE_GENERATOR }}" `
            -DCMAKE_BUILD_TYPE="${{ inputs.build_type }}" `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" `
            -DZZ_BUILD_SHARED_LIBS="${{ inputs.build_shared && 'ON' || 'OFF' }}" `
            -DZZ_BUILD_EXAMPLE="${{ inputs.build_example && 'ON' || 'OFF' }}" `
            -DZZ_INSTALL=ON

      # -----------------------------------------------------------------------
      # 5. 编译
      # -----------------------------------------------------------------------
      - name: CMake 编译
        shell: pwsh
        run: cmake --build build --parallel

      # -----------------------------------------------------------------------
      # 5b. 安装 SDK 到标准目录（include / lib / bin / cmake 配置）
      # -----------------------------------------------------------------------
      - name: 安装 SDK（cmake --install）
        shell: pwsh
        run: |
          $installRoot = Join-Path $env:GITHUB_WORKSPACE "install"
          cmake --install build --prefix $installRoot
          Write-Host "SDK 安装目录: $installRoot"
          Get-ChildItem -Path $installRoot -Recurse | Select-Object FullName

      # -----------------------------------------------------------------------
      # 6. 打包可运行测试包（exe + ZzFluent.dll + Qt 运行时 + MSVC 运行库）
      #    使用 windeployqt 收集 Qt 依赖，下载解压后可直接双击运行
      # -----------------------------------------------------------------------
      - name: 打包可运行测试包
        if: ${{ inputs.build_example }}
        shell: pwsh
        run: |
          $exampleDir = Join-Path $env:GITHUB_WORKSPACE "build/example"
          $exe = Join-Path $exampleDir "ZzFluentExample.exe"
          if (-not (Test-Path $exe)) {
            throw "未找到示例程序: $exe"
          }

          # 将 ZzFluent.dll 放到 exe 同目录（windeployqt 不会自动处理我们自己的库）
          $zzDll = Get-ChildItem -Path "build" -Filter "ZzFluent.dll" -Recurse | Select-Object -First 1
          if ($zzDll) {
            Copy-Item $zzDll.FullName $exampleDir -Force
            Write-Host "已复制: $($zzDll.FullName) -> $exampleDir"
          }

          $windeployqt = Join-Path $env:QT_ROOT_DIR "bin/windeployqt.exe"
          if (-not (Test-Path $windeployqt)) {
            throw "未找到 windeployqt: $windeployqt"
          }

          # Release 用 --release，Debug 用 --debug；--compiler-runtime 打包 MSVC 运行库
          $buildType = "${{ inputs.build_type }}"
          $deployFlag = if ($buildType -eq "Debug") { "--debug" } else { "--release" }
          Write-Host "运行: $windeployqt $deployFlag --compiler-runtime $exe"
          & $windeployqt $deployFlag --compiler-runtime $exe

          @"
          ZzFluent 可运行示例包
          ====================
          双击 ZzFluentExample.exe 即可运行。

          本目录已包含：
            - ZzFluentExample.exe（示例程序）
            - ZzFluent.dll（本库）
            - Qt 6 运行时 DLL 与 plugins
            - MSVC 运行库（无需单独安装 Qt / VC++）

          系统要求：Windows 10+ 64 位
          构建类型：$buildType
          Qt 版本：${{ inputs.qt_version }}
          "@ | Out-File -FilePath (Join-Path $exampleDir "使用说明.txt") -Encoding utf8

          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $zipPath = Join-Path $env:GITHUB_WORKSPACE "dist/ZzFluent-portable.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path (Join-Path $exampleDir "*") -DestinationPath $zipPath -Force
          Write-Host "已生成: $zipPath"

      # -----------------------------------------------------------------------
      # 7. 打包完整 SDK（给别人二次开发用）
      #    包含：头文件、lib、cmake 配置、运行时 dll、说明文档、集成示例
      #    注意：SDK 不包含 Qt，使用者需自行安装同版本 Qt
      # -----------------------------------------------------------------------
      - name: 打包完整 SDK
        shell: pwsh
        run: |
          $installRoot = Join-Path $env:GITHUB_WORKSPACE "install"
          if (-not (Test-Path $installRoot)) {
            throw "未找到 SDK 安装目录: $installRoot"
          }

          # 附带许可证与使用说明
          Copy-Item (Join-Path $env:GITHUB_WORKSPACE "LICENSE") $installRoot -Force
          Copy-Item (Join-Path $env:GITHUB_WORKSPACE "packaging/sdk/SDK使用说明.txt") $installRoot -Force
          Copy-Item (Join-Path $env:GITHUB_WORKSPACE "packaging/sdk/examples") $installRoot -Recurse -Force

          # Debug 构建时附带 PDB，便于调试
          $buildType = "${{ inputs.build_type }}"
          if ($buildType -eq "Debug") {
            $pdb = Get-ChildItem -Path build -Filter "ZzFluent.pdb" -Recurse | Select-Object -First 1
            if ($pdb) {
              $pdbDest = Join-Path $installRoot "lib"
              New-Item -ItemType Directory -Force -Path $pdbDest | Out-Null
              Copy-Item $pdb.FullName $pdbDest -Force
              Write-Host "已附带 PDB: $($pdb.FullName)"
            }
          }

          $sharedFlag = "${{ inputs.build_shared }}"
          $buildInfo = @"
          ZzFluent SDK 构建信息
          ====================
          版本: 0.1.0
          平台: Windows x64 (MSVC 2022)
          构建类型: $buildType
          库类型: $(if ($sharedFlag -eq 'true') { '动态库 (SHARED)' } else { '静态库 (STATIC)' })
          Qt 版本: ${{ inputs.qt_version }}
          构建时间(UTC): $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')
          GitHub Run: ${{ github.run_id }}

          目录说明:
            include/   公开头文件
            lib/       导入库 .lib 与 CMake 包配置
            bin/       运行时 .dll（动态库构建时）
            examples/  最小集成示例
          "@
          $buildInfo | Out-File -FilePath (Join-Path $installRoot "BUILD_INFO.txt") -Encoding utf8

          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $sdkZip = Join-Path $env:GITHUB_WORKSPACE "dist/ZzFluent-sdk.zip"
          if (Test-Path $sdkZip) { Remove-Item $sdkZip -Force }
          Compress-Archive -Path (Join-Path $installRoot "*") -DestinationPath $sdkZip -Force
          Write-Host "已生成 SDK: $sdkZip"

      # -----------------------------------------------------------------------
      # 8. 上传 Artifact
      #    - portable：可运行完整包（下载后可直接测试 Demo）
      #    - sdk：完整开发包（头文件 + lib + cmake + 说明 + 示例）
      # -----------------------------------------------------------------------
      - name: 上传可运行测试包（推荐）
        if: ${{ inputs.build_example }}
        uses: actions/upload-artifact@v4
        with:
          name: ZzFluent-portable-${{ inputs.build_type }}-Qt${{ inputs.qt_version }}
          path: dist/ZzFluent-portable.zip
          retention-days: 30

      - name: 上传完整 SDK（二次开发）
        uses: actions/upload-artifact@v4
        with:
          name: ZzFluent-sdk-${{ inputs.build_type }}-Qt${{ inputs.qt_version }}
          path: dist/ZzFluent-sdk.zip
          retention-days: 30

      # -----------------------------------------------------------------------
      # 9. 打印关键产物路径，便于排查
      # -----------------------------------------------------------------------
      - name: 列出编译输出
        shell: pwsh
        run: |
          Write-Host "==== install SDK 目录 ===="
          Get-ChildItem -Path install -Recurse -ErrorAction SilentlyContinue
          Write-Host "==== build 目录 ===="
          Get-ChildItem -Path build -Recurse -Include *.exe,*.dll,*.lib -ErrorAction SilentlyContinue
          Write-Host "==== 可运行包内容（build/example）===="
          Get-ChildItem -Path build/example -ErrorAction SilentlyContinue
